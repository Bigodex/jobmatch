name: jobmatch
description: "A new Flutter project."

# =======================================================
# PUBLICAÇÃO
# =======================================================
publish_to: 'none'

# =======================================================
# VERSIONAMENTO
# =======================================================
version: 1.0.0+1

# =======================================================
# SDK
# =======================================================
environment:
  sdk: ^3.11.0

# =======================================================
# DEPENDÊNCIAS PRINCIPAIS
# =======================================================
dependencies:
  flutter:
    sdk: flutter

  # ---------------------------------------------------
  # UI / DESIGN
  # ---------------------------------------------------
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2

  # ---------------------------------------------------
  # STATE MANAGEMENT
  # ---------------------------------------------------
  flutter_riverpod: ^3.3.1

  # ---------------------------------------------------
  # ROUTING
  # ---------------------------------------------------
  go_router: ^17.1.0

  # ---------------------------------------------------
  # UTILITÁRIOS
  # ---------------------------------------------------
  intl: ^0.20.2
  uuid: ^4.5.3
  equatable: ^2.0.8
  lucide_icons: ^0.257.0
  phosphor_flutter: ^2.1.0

# =======================================================
# DEV DEPENDENCIES
# =======================================================
dev_dependencies:
  flutter_test:
    sdk: flutter

  # ---------------------------------------------------
  # LINTS / PADRÕES
  # ---------------------------------------------------
  flutter_lints: ^6.0.0

  # ---------------------------------------------------
  # CODE GENERATION
  # ---------------------------------------------------
  build_runner: ^2.13.1
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  json_serializable: ^6.13.1

# =======================================================
# FLUTTER CONFIG
# =======================================================
flutter:

  # ---------------------------------------------------
  # MATERIAL
  # ---------------------------------------------------
  uses-material-design: true

  # ---------------------------------------------------
  # ASSETS (futuro)
  # ---------------------------------------------------
  assets:
     - assets/images/
     - assets/icons/

  # ---------------------------------------------------
  # FONTS (opcional)
  # ---------------------------------------------------
  # fonts:
  #   - family: MinhaFonte
  #     fonts:
  #       - asset: assets/fonts/minha_fonte.ttf