name: jobmatch
description: "A new Flutter project."

# =======================================================
# PUBLICAÇÃO
# =======================================================
publish_to: 'none'

# =======================================================
# VERSIONAMENTO
# =======================================================
version: 1.0.0+1

# =======================================================
# SDK
# =======================================================
environment:
  sdk: ^3.11.0

# =======================================================
# DEPENDÊNCIAS PRINCIPAIS
# =======================================================
dependencies:
  flutter:
    sdk: flutter

  # ---------------------------------------------------
  # UI / DESIGN
  # ---------------------------------------------------
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2

  # ---------------------------------------------------
  # STATE MANAGEMENT
  # ---------------------------------------------------
  flutter_riverpod: ^3.3.1

  # ---------------------------------------------------
  # ROUTING
  # ---------------------------------------------------
  go_router: ^17.1.0

  # ---------------------------------------------------
  # UTILITÁRIOS
  # ---------------------------------------------------
  intl: ^0.20.2
  uuid: ^4.5.3
  equatable: ^2.0.8
  freezed_annotation: ^3.1.0

  # ---------------------------------------------------
  # ICONS
  # ---------------------------------------------------
  lucide_icons: ^0.257.0
  phosphor_flutter: ^2.1.0

  # ---------------------------------------------------
  # FIREBASE
  # ---------------------------------------------------
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0

  # ---------------------------------------------------
  # IMAGE UPLOAD
  # ---------------------------------------------------
  image_picker: ^1.0.7
  http: ^1.2.0

  # ---------------------------------------------------
  # VIDEO PLAYER
  # ---------------------------------------------------
  video_player: ^2.8.2

# =======================================================
# DEV DEPENDENCIES
# =======================================================
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  archive: ^4.0.7

  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1

# =======================================================
# FLUTTER CONFIG
# =======================================================
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/video/
